<!DOCTYPE html>
<html>
<head>

  <title>Offline</title>
  <style>
    body {
      margin: 0;
      background: #0D1117;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .icon { font-size: 3.5rem; margin-bottom: 12px; }

      color: #000;
      border: none;
      padding: 12px 28px;
