<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeCorn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D1117;
      color: #fff;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .card {
      background: #0D1B2A;
      border: 4px solid #fff;
      border-radius: 16px;
      padding: 28px 20px;
      width: 90%;
      max-width: 340px;
      position: relative;
      margin-bottom: 40px;
    }

    .emoji {
      position: absolute;
      font-size: 1.8rem;
    }

    .emoji.tl { top: 8px; left: 14px; }
    .emoji.tr { top: 10px; right: 14px; }
    .emoji.bl { bottom: 6px; left: 10px; }
    .emoji.br { bottom: 6px; right: 60px; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .corn { font-size: 2.2rem; }

    .name {
      color: #FFD700;
      font-size: 1.9rem;
      font-weight: 900;
      text-shadow: 2px 2px 0 #000;
    }

    .walker {
      font-size: 1.6rem;
      margin-bottom: 8px;
      animation: walk 0.6s steps(2) infinite;
    }

    @keyframes walk {
      0%   { transform: scaleX(1); }
      50%  { transform: scaleX(-1); }
      100% { transform: scaleX(1); }
    }

    .bar-wrap {
      width: 220px;
      height: 18px;
      background: #0D1B2A;
      border: 3px solid #fff;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 auto 10px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #0047AB;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .status {
      color: #3CFF3C;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="emoji tl">🐥</span>
    <span class="emoji tr">🦀</span>
    <span class="emoji bl">🥥</span>
    <span class="emoji br">🦆</span>
    <div class="logo">
      <span class="corn">🌽</span>
      <span class="name">AnimeCorn</span>
    </div>
  </div>

  <div class="walker" id="walker">🦄</div>

  <div class="bar-wrap">
    <div class="bar-fill" id="bar"></div>
  </div>

  <div class="status" id="status">LOADING...</div>

  <script>
    const RENDER_URL = 'https://videosite-v2.onrender.com';
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');
    let progress = 0;
    let attempts = 0;

    // Animate bar while waiting
    const barTimer = setInterval(function() {
      if (progress < 90) {
        progress += Math.random() * 8;
        bar.style.width = Math.min(progress, 90) + '%';
      }
    }, 600);

    function tryLoad() {
      attempts++;
      status.textContent = attempts > 1 ? 'WAKING UP... (' + attempts + ')' : 'LOADING...';

      fetch(RENDER_URL + '/api/videos', { method: 'GET', cache: 'no-store' })
        .then(function(res) {
          if (res.ok) {
            clearInterval(barTimer);
            bar.style.width = '100%';
            status.textContent = 'READY!';
            setTimeout(function() {
              window.location.href = RENDER_URL;
            }, 300);
          } else {
            setTimeout(tryLoad, 3000);
          }
        })
        .catch(function() {
          setTimeout(tryLoad, 3000);
        });
    }

    tryLoad();
  </script>

</body>
</html>
